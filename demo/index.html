<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>語り場ガチャ</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #fff7ed;
      --bg2: #ffffff;
      --bg3: #eff6ff;
      --text: #1f2937;
      --muted: #64748b;
      --card: rgba(255,255,255,0.82);
      --line: rgba(148,163,184,0.22);
      --shadow: 0 18px 45px rgba(15,23,42,0.10);
      --shadow-soft: 0 10px 25px rgba(15,23,42,0.08);
      --accent: #111827;
      --accent-2: #fb923c;
      --blue: #60a5fa;
    }

    body {
      margin: 0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(251,191,36,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(96,165,250,0.14), transparent 26%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 42%, var(--bg3) 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 22px;
    }

    .top {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      letter-spacing: 0.02em;
    }

    .status-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pill,
    .point-box {
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: var(--shadow-soft);
      font-weight: 700;
    }

    .back-news-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      color: #7c2d12;
      background: rgba(255,255,255,0.9);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .back-news-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(15,23,42,0.12);
    }

    .nav-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: min(360px, 100%);
      gap: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 22px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 18px;
    }

    .nav-btn {
      border: none;
      background: transparent;
      color: #334155;
      padding: 14px 18px;
      min-width: 0;
      border-radius: 16px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .nav-btn.active {
      background: linear-gradient(135deg, #111827 0%, #334155 100%);
      color: #fff;
      box-shadow: 0 10px 20px rgba(15,23,42,0.22);
    }

    .page { display: none; }
    .page.active { display: block; }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .machine-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .machine-box {
      min-height: calc(100vh - 240px);
      border-radius: 30px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.85), rgba(255,255,255,0) 35%),
        linear-gradient(180deg, #fecaca 0%, #fff1f2 45%, #fff7ed 100%);
      border: 1px solid rgba(255,255,255,0.7);
      position: relative;
      overflow: hidden;
    }

    .machine-box::before {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      filter: blur(8px);
      top: -110px;
      left: -100px;
    }

    .machine-stage {
      position: relative;
      width: 330px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .machine-body {
      position: absolute;
      inset: 0;
      border-radius: 42px 42px 36px 36px;
      background: linear-gradient(180deg, #ef4444 0%, #dc2626 65%, #b91c1c 100%);
      box-shadow: inset 0 8px 16px rgba(255,255,255,0.22), 0 20px 35px rgba(185,28,28,0.18);
    }

    .machine-top {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.95), rgba(255,255,255,0.55) 36%, rgba(255,255,255,0.22) 70%, rgba(255,255,255,0.08) 100%);
      border: 12px solid rgba(255,255,255,0.75);
      overflow: hidden;
      backdrop-filter: blur(4px);
      transition: transform 1s linear;
    }

    .machine-top.spinning { animation: spin 1s linear infinite; }

    .capsule-dots {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 44px;
      opacity: 0.82;
    }

    .dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      justify-self: center;
      align-self: center;
      box-shadow: inset 0 3px 6px rgba(255,255,255,0.4);
    }

    .dot:nth-child(4n+1) { background: #fdba74; }
    .dot:nth-child(4n+2) { background: #86efac; }
    .dot:nth-child(4n+3) { background: #93c5fd; }
    .dot:nth-child(4n) { background: #f9a8d4; }

    .machine-slot {
      position: absolute;
      bottom: 106px;
      left: 50%;
      transform: translateX(-50%);
      width: 132px;
      height: 20px;
      border-radius: 999px;
      background: #7f1d1d;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.35);
    }

    .machine-tray {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 72px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      border: 5px solid #cbd5e1;
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.65);
    }

    .handle-wrap {
      position: absolute;
      right: -18px;
      top: 176px;
      width: 100px;
      height: 100px;
      z-index: 2;
    }

    .handle-rod {
      position: absolute;
      right: 40px;
      top: 42px;
      width: 54px;
      height: 12px;
      border-radius: 999px;
      background: #1f2937;
      transform-origin: left center;
      transition: transform 0.5s ease;
    }

    .handle-wrap.spinning .handle-rod { transform: rotate(140deg); }

    .handle-knob {
      position: absolute;
      right: 0;
      top: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(180deg, #1f2937 0%, #0f172a 100%);
      box-shadow: 0 8px 16px rgba(15,23,42,0.2);
    }

    .shine {
      position: absolute;
      inset: auto 46px 94px 46px;
      height: 110px;
      border-radius: 0 0 26px 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02));
      pointer-events: none;
    }

    @keyframes spin {
      from { transform: translateX(-50%) rotate(0deg); }
      to { transform: translateX(-50%) rotate(360deg); }
    }

    .spin-btn {
      margin-top: 24px;
      border: none;
      border-radius: 18px;
      padding: 16px 30px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #111827 0%, #334155 100%);
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(15,23,42,0.22);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      z-index: 1;
      min-width: 180px;
    }

    .spin-btn:hover { transform: translateY(-1px); }
    .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .result-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .result-stage {
      flex: 1;
      min-height: 360px;
      border-radius: 26px;
      background:
        radial-gradient(circle at top, rgba(251,191,36,0.12), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px dashed #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      position: relative;
      overflow: hidden;
    }

    .result-stage::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      filter: blur(10px);
      top: -80px;
      right: -40px;
    }

    .placeholder {
      color: #94a3b8;
      text-align: center;
      line-height: 1.8;
      z-index: 1;
    }

    .figure-card {
      text-align: center;
      width: 100%;
      animation: pop 0.45s ease;
      position: relative;
      z-index: 1;
    }

    .figure-card--single {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    @keyframes pop {
      from { transform: scale(0.84) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .figure-card img {
      width: 230px;
      height: 230px;
      object-fit: cover;
      border-radius: 26px;
      box-shadow: 0 16px 36px rgba(15,23,42,0.16);
      background: #fff;
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 7px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
    }

    .N { background: #e5e7eb; color: #374151; }
    .R { background: #dbeafe; color: #1d4ed8; }
    .SR { background: #ede9fe; color: #6d28d9; }
    .SSR { background: #fef3c7; color: #b45309; }

    .figure-name {
      font-size: 24px;
      font-weight: 700;
      margin-top: 12px;
    }

    .figure-text {
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.6;
    }

    .count {
      margin-top: 8px;
      font-weight: 700;
    }

    .result-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .result-tile {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      border: 1px solid rgba(226,232,240,0.9);
      box-shadow: var(--shadow-soft);
      aspect-ratio: 1 / 1;
    }

    .result-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .result-tile-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      margin: 0;
      padding: 3px 8px;
      font-size: 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(3px);
    }

    .progress-wrap {
      margin-top: 16px;
      background: rgba(255,255,255,0.95);
      padding: 14px;
      border-radius: 20px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(226,232,240,0.9);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #fb923c 0%, #60a5fa 100%);
      width: 0%;
      transition: width 0.3s ease;
    }

    .collection-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .small-tabs {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(226,232,240,0.9);
      padding: 8px;
      border-radius: 20px;
      box-shadow: var(--shadow-soft);
    }

    .tab-btn {
      border: none;
      background: transparent;
      color: #334155;
      padding: 10px 14px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #111827 0%, #334155 100%);
      color: #fff;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(226,232,240,0.9);
      box-shadow: var(--shadow-soft);
    }

    .thumb {
      width: 82px;
      height: 82px;
      border-radius: 20px;
      object-fit: cover;
      background: #f3f4f6;
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.4);
    }

    .thumb.locked { filter: grayscale(1); opacity: 0.34; }
    .item-main { flex: 1; min-width: 0; }
    .item-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .item-name { font-weight: 700; margin-top: 4px; font-size: 15px; }
    .item-text { color: var(--muted); font-size: 13px; margin-top: 4px; line-height: 1.5; }
    .item-count { text-align: right; font-weight: 700; min-width: 56px; color: #0f172a; }

    .gacha-loading-wrap {
      width: 100%;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(251, 191, 36, 0.16), transparent 35%),
        linear-gradient(180deg, #fffaf4 0%, #ffffff 100%);
      border-radius: 24px;
    }

    .gacha-loading-wrap::before,
    .gacha-loading-wrap::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .gacha-loading-wrap::before {
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.14), transparent 70%);
      top: -80px;
      right: -40px;
    }

    .gacha-loading-wrap::after {
      width: 170px;
      height: 170px;
      background: radial-gradient(circle, rgba(251, 146, 60, 0.10), transparent 70%);
      bottom: -60px;
      left: -40px;
    }

    .gacha-loading-ring {
      position: absolute;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      border: 1px solid rgba(251, 146, 60, 0.24);
      animation: gachaLoadingRotate 2.8s linear infinite;
    }

    .gacha-loading-ring.ring-2 {
      width: 150px;
      height: 150px;
      animation-direction: reverse;
      animation-duration: 2s;
      opacity: 0.65;
    }

    .gacha-loading-particle {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(251, 191, 36, 0.8);
    }

    .gacha-loading-ring .gacha-loading-particle:nth-child(1) {
      top: -6px;
      left: calc(50% - 6px);
      background: #fbbf24;
    }

    .gacha-loading-ring .gacha-loading-particle:nth-child(2) {
      right: 18px;
      bottom: 26px;
      background: #fb923c;
    }

    .gacha-loading-ring .gacha-loading-particle:nth-child(3) {
      left: 18px;
      bottom: 26px;
      background: #fde68a;
    }

    .gacha-loading-core {
      position: relative;
      z-index: 2;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.98), rgba(255,255,255,0.55)),
        radial-gradient(circle at center, rgba(251, 191, 36, 0.18), rgba(251, 146, 60, 0.08));
      box-shadow:
        0 0 34px rgba(251, 191, 36, 0.26),
        inset 0 0 16px rgba(255,255,255,0.9);
    }

    .gacha-loading-capsule {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 16px 28px rgba(251, 146, 60, 0.18),
        0 0 20px rgba(251, 191, 36, 0.34);
      animation: gachaLoadingBounce 1.1s ease-in-out infinite;
    }

    .gacha-loading-capsule-top,
    .gacha-loading-capsule-bottom { width: 100%; height: 50%; }
    .gacha-loading-capsule-top { background: linear-gradient(180deg, #fff7ed, #ffedd5); }
    .gacha-loading-capsule-bottom { background: linear-gradient(180deg, #fb923c, #f97316); }

    .gacha-loading-title {
      margin-top: 34px;
      font-size: 19px;
      font-weight: 800;
      color: #7c2d12;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .gacha-loading-sub {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.7;
      color: #9a6b39;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .gacha-loading-dots { display: inline-flex; gap: 4px; margin-left: 4px; }
    .gacha-loading-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #c2410c;
      animation: gachaLoadingDots 1.2s infinite ease-in-out;
    }
    .gacha-loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .gacha-loading-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes gachaLoadingRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes gachaLoadingBounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
    @keyframes gachaLoadingDots { 0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1.2); opacity: 1; } }

    .back-news-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(251, 191, 36, 0.18), transparent 30%),
        rgba(255, 247, 237, 0.96);
      backdrop-filter: blur(6px);
    }

    .back-news-overlay.is-open { display: flex; }

    .back-news-card {
      width: min(340px, 86vw);
      min-height: 280px;
      border-radius: 28px;
      background: linear-gradient(180deg, #fffaf4 0%, #fff 100%);
      box-shadow: 0 24px 60px rgba(15,23,42,0.12), 0 8px 24px rgba(251,146,60,0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      padding: 28px 20px;
    }

    .back-news-orbit {
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 1px solid rgba(251,146,60,0.28);
      animation: backNewsRotate 3s linear infinite;
    }

    .back-news-orbit span {
      position: absolute;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #fbbf24;
      box-shadow: 0 0 16px rgba(251,191,36,0.8);
    }

    .back-news-orbit span:nth-child(1) { top: -6px; left: calc(50% - 6px); }
    .back-news-orbit span:nth-child(2) { right: 12px; bottom: 24px; background: #fb923c; }
    .back-news-orbit span:nth-child(3) { left: 12px; bottom: 24px; background: #fde68a; }

    .back-news-core {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.98), rgba(255,255,255,0.55)),
        radial-gradient(circle at center, rgba(251,191,36,0.22), rgba(251,146,60,0.08));
      box-shadow: 0 0 32px rgba(251,191,36,0.3), inset 0 0 18px rgba(255,255,255,0.8);
      animation: backNewsPulse 1.4s ease-in-out infinite;
      z-index: 1;
    }

    .back-news-title {
      margin-top: 30px;
      font-size: 19px;
      font-weight: 800;
      color: #7c2d12;
      text-align: center;
      z-index: 1;
    }

    .back-news-sub {
      margin-top: 8px;
      font-size: 13px;
      color: #9a6b39;
      text-align: center;
      z-index: 1;
    }

    @keyframes backNewsRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes backNewsPulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.08); opacity: 1; } }

    @media (max-width: 980px) {
      .machine-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .wrap { padding: 14px; }
      h1 { font-size: 28px; }
      .nav-tabs { width: 100%; display: grid; }
      .nav-btn { padding: 12px 10px; font-size: 14px; }
      .machine-box { min-height: calc(100vh - 210px); padding: 18px 14px 16px; }
      .machine-stage { width: 250px; height: 320px; }

  <script>
    const NEWS_API_URL = "https://script.google.com/macros/s/AKfycbw7YwgTW-iau9Ep6tkJYeyMfuS3QugXueWF292eFDECxv_3VDphY837DLTxxkZIkfoSxg/exec";
    const DEFAULT_NEWS_SITE_URL = "https://araragi0040-jpg.github.io/community-news-pwa/demo/";

    const gachaParams = new URLSearchParams(window.location.search);
    const gachaTicket = gachaParams.get("ticket");
    const isAdmin = gachaParams.get("admin") === "1";
    const returnUrl = gachaParams.get("returnUrl") || "";
    let latestNewsPoints = null;

    const GACHA_ASSET_VERSION = "3";

    function assetUrl(url) {
      const raw = String(url || "").trim();
      if (!raw) return raw;
      if (/^https?:\/\//i.test(raw)) return raw;
      const sep = raw.includes("?") ? "&" : "?";
      return `${raw}${sep}v=${encodeURIComponent(GACHA_ASSET_VERSION)}`;
    }

    function findPointElement() {
      return (
        document.getElementById("newsPoints") ||
        document.getElementById("gachaPoints") ||
        document.getElementById("pointCount")
      );
    }

    function updateMultiSpinButton(pointsValue) {
      const btn = document.getElementById("multiSpinBtn");
      if (!btn) return;
      const points = Number(pointsValue || 0);
      const safePoints = Number.isFinite(points) && points >= 0 ? Math.floor(points) : 0;
      const drawCount = Math.min(10, safePoints);
      if (drawCount <= 0) {
        btn.textContent = "pt不足";
        btn.disabled = true;
        return;
      }
      btn.textContent = `${drawCount}連で引く`;
      btn.disabled = false;
    }

    function renderGachaLoadingAnimation(titleText, subText) {
      const title = titleText || "ガチャ抽選中";
      const sub = subText || "カプセルを準備しています";
      resultStage.innerHTML = `
        <div class="gacha-loading-wrap">
          <div class="gacha-loading-ring"><span class="gacha-loading-particle"></span><span class="gacha-loading-particle"></span><span class="gacha-loading-particle"></span></div>
          <div class="gacha-loading-ring ring-2"><span class="gacha-loading-particle"></span><span class="gacha-loading-particle"></span><span class="gacha-loading-particle"></span></div>
          <div class="gacha-loading-core"><div class="gacha-loading-capsule"><div class="gacha-loading-capsule-top"></div><div class="gacha-loading-capsule-bottom"></div></div></div>
          <div class="gacha-loading-title">${title}<span class="gacha-loading-dots"><span></span><span></span><span></span></span></div>
          <div class="gacha-loading-sub">${sub}</div>
        </div>
      `;
    }

    async function callNewsApiFromGacha(action, payload = {}) {
      const res = await fetch(NEWS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, ...payload })
      });
      const text = await res.text();
      console.log("GACHA API RESPONSE:", action, text);
      try {
        return text ? JSON.parse(text) : {};
      } catch (err) {
        console.error("API response parse error:", err, text);
        return { ok: false, code: "INVALID_RESPONSE", message: "APIの返答を読み取れませんでした。" };
      }
    }

    function renderNewsPoints(pointsValue) {
      const points = Number(pointsValue || 0);
      const safePoints = Number.isFinite(points) && points >= 0 ? Math.floor(points) : 0;
      latestNewsPoints = safePoints;
      const el = findPointElement();
      if (!el) {
        console.warn("pt表示用の要素が見つかりません。id='newsPoints' をHTMLに追加してください。");
        return;
      }
      el.textContent = `${safePoints}pt`;
      updateMultiSpinButton(safePoints);
    }

    async function loadNewsPointsForGacha() {
      if (!gachaTicket) {
        console.warn("ticket がありません。ニュースサイトから入り直してください。");
        const el = document.getElementById("newsPoints");
        if (el) el.textContent = "--pt";
        updateMultiSpinButton(0);
        return;
      }
      const data = await callNewsApiFromGacha("getGachaStatus", { ticket: gachaTicket });
      if (!data.ok) {
        console.warn("getGachaStatus failed:", data);
        const el = document.getElementById("newsPoints");
        if (el) el.textContent = "--pt";
        updateMultiSpinButton(0);
        return;
      }
      renderNewsPoints(data.remainingPoints ?? data.points ?? 0);
    }

    async function consumePointBeforeGacha() {
      if (!gachaTicket) {
        alert("ニュースサイトから入り直してください。");
        return { ok: false };
      }
      const data = await callNewsApiFromGacha("useGachaPoint", { ticket: gachaTicket });
      if (!data.ok) {
        console.warn("useGachaPoint failed:", data);
        if (data.code === "NOT_ENOUGH_POINTS") {
          renderNewsPoints(data.remainingPoints ?? data.remainingPt ?? data.points ?? 0);
          alert("ptが不足しています。ニュースサイトでptを貯めてから引いてください。");
        } else if (data.code === "TICKET_EXPIRED") {
          alert("接続時間が切れました。ニュースサイトから入り直してください。");
        } else if (data.code === "INVALID_TICKET") {
          alert("ガチャチケットが無効です。ニュースサイトから入り直してください。");
        } else {
          alert(data.message || "ガチャを引けませんでした。");
        }
        return { ok: false };
      }
      renderNewsPoints(data.remainingPoints ?? data.remainingPt ?? data.points ?? 0);
      return { ok: true, ...data };
    }

    async function consumePointsBeforeMultiGacha(requestedCount) {
      if (!gachaTicket) {
        alert("ニュースサイトから入り直してください。");
        return { ok: false };
      }
      const data = await callNewsApiFromGacha("useGachaPoints", { ticket: gachaTicket, count: requestedCount });
      if (!data.ok) {
        console.warn("useGachaPoints failed:", data);
        if (data.code === "NOT_ENOUGH_POINTS") {
          renderNewsPoints(data.remainingPoints ?? data.points ?? 0);
          alert("ptが不足しています。");
        } else if (data.code === "TICKET_EXPIRED") {

        } else if (data.code === "INVALID_TICKET") {

        } else {
          alert(data.message || "ガチャを引けませんでした。");

        return { ok: false };

      renderNewsPoints(data.remainingPoints ?? data.points ?? 0);
      return { ok: true, ...data };

      if (!gachaTicket) return { ok: false };
      const safeCount = Math.max(1, Math.min(10, Math.floor(Number(count || 1))));
      const data = await callNewsApiFromGacha("refundGachaPoints", {
        ticket: gachaTicket,
        count: safeCount

      if (data && data.ok) {
        renderNewsPoints(data.remainingPoints ?? data.points ?? latestNewsPoints ?? 0);

      return data;

    async function getGachaCollectionFromServer() {
      if (!gachaTicket) return { ok: false };
      return await callNewsApiFromGacha("getGachaCollection", { ticket: gachaTicket });
    }

    function applyServerCollection(data) {
      if (!data || !data.ok) return;
      inventory = data.inventory || {};
      totalSpins = Number(data.totalSpins || 0);
      saveState();
      renderTab();
    }

    function getFigureNo(figure) {
      const index = FIGURES.findIndex(item => item.id === figure.id);
      return `No.${index >= 0 ? index + 1 : "?"}`;
    }

    function buildLocalImportItems() {
      return FIGURES.map(figure => {
        const count = Number(inventory[figure.id] || 0);
        return { id: figure.id, no: getFigureNo(figure), name: figure.name, rarity: figure.rarity, concept: figure.concept, image: figure.image, count };
      }).filter(item => item.count > 0);
    }

    async function importLocalInventoryIfNeeded(serverData) {
      const serverTotal = Number(serverData?.totalSpins || 0);
      const localTotal = Number(totalSpins || 0);
      if (serverTotal > 0 || localTotal <= 0) return serverData;
      const items = buildLocalImportItems();
      if (!items.length) return serverData;
      return await callNewsApiFromGacha("importLocalGachaInventory", { ticket: gachaTicket, items });
    }

    async function loadGachaCollectionFromServer() {
      const serverData = await getGachaCollectionFromServer();
      if (!serverData.ok) {
        console.warn("getGachaCollection failed:", serverData);
        return;

      const finalData = await importLocalInventoryIfNeeded(serverData);
      if (finalData && finalData.ok) applyServerCollection(finalData);

      { id: 27, name: 'じんさん', rarity: 'SR', dropRate: 10, concept: '木工職人', image: 'images/じんさん_木工.png' },
      { id: 28, name: '海賊けん', rarity: 'SR', dropRate: 10, concept: 'ベース演奏', image: 'images/ケンさん_ベース演奏.png' },
      { id: 29, name: 'しゅうへい', rarity: 'SR', dropRate: 10, concept: 'LIFE ARTS LIVE', image: 'images/しゅう_MC.png' },
      { id: 30, name: 'とっとくん', rarity: 'SR', dropRate: 10, concept: 'デザイナー', image: 'images/とっとくん_デザイナー.png' },
      { id: 33, name: 'たかちゃん', rarity: 'SR', dropRate: 10, concept: 'オンライン講座', image: 'images/たかちゃん_オンライン講座.png' },
      { id: 34, name: 'ゆかちゃん', rarity: 'SR', dropRate: 10, concept: 'あべちゃんメイク', image: 'images/ゆか_あべちゃんメイク.png' },
      { id: 35, name: 'おかっち', rarity: 'SR', dropRate: 10, concept: 'パンプアップ', image: 'images/おかっち_ジム.png' },
      { id: 36, name: 'ぐっちょん', rarity: 'SR', dropRate: 10, concept: '本収集', image: 'images/ぐっちょん_本収集.png' },
      { id: 31, name: 'かずま', rarity: 'SR', dropRate: 10, concept: '研究', image: 'images/かずま_研究.png' }
    ];

    const STORAGE_KEY = 'katariba_gacha_inventory_v2';
    const STORAGE_SPIN_KEY = 'katariba_gacha_spin_count_v2';

    let inventory = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    let totalSpins = Number(localStorage.getItem(STORAGE_SPIN_KEY) || 0);
    let activeTab = 'collection';
    let spinning = false;

    const spinBtn = document.getElementById('spinBtn');
    const machineTop = document.getElementById('machineTop');
    const handleWrap = document.getElementById('handleWrap');
    const resultModal = document.getElementById('resultModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const resultStage = document.getElementById('resultStage');
    const tabContent = document.getElementById('tabContent');
    const spinCount = document.getElementById('spinCount');
    const collectionText = document.getElementById('collectionText');
    const progressBar = document.getElementById('progressBar');
    const collectionTabs = document.getElementById('collectionTabs');
    const multiSpinBtn = document.getElementById('multiSpinBtn');
    const backToNewsBtn = document.getElementById('backToNewsBtn');

    if (isAdmin && collectionTabs) collectionTabs.style.display = 'inline-grid';

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
      localStorage.setItem(STORAGE_SPIN_KEY, String(totalSpins));
    }

    function weightedDraw(pool) {
      const total = pool.reduce((sum, item) => sum + item.dropRate, 0);
      const rand = Math.random() * total;
      let cumulative = 0;
      for (const item of pool) {
        cumulative += item.dropRate;
        if (rand <= cumulative) return item;
      }
      return pool[pool.length - 1];
    }

    function getOwnedCount() {
      return FIGURES.filter(f => (inventory[f.id] || 0) > 0).length;
    }

    function updateProgress() {
      const owned = getOwnedCount();
      const total = FIGURES.length;
      const rate = total === 0 ? 0 : Math.round((owned / total) * 100);
      collectionText.textContent = `${owned}/${total}`;
      progressBar.style.width = `${rate}%`;
      spinCount.textContent = totalSpins;
    }

    function renderCollectionTab() {
      const html = FIGURES.map((figure, index) => {
        const count = inventory[figure.id] || 0;
        const owned = count > 0;
        const imgClass = owned ? 'thumb' : 'thumb locked';
        const imgSrc = owned ? assetUrl(figure.image) : 'https://placehold.co/120x120?text=LOCK';
        const name = owned ? figure.name : '未獲得';
        const text = owned ? figure.concept : 'ガチャで引くと公開されます';
        const figureNo = `No.${index + 1}`;
        return `
          <div class="item">
            <img class="${imgClass}" src="${imgSrc}" alt="${name}" onerror="this.src='https://placehold.co/120x120?text=?'">
            <div class="item-main">
              <div class="item-row"><div><strong>${figureNo}</strong></div><span class="badge ${figure.rarity}" style="margin-top:0;">${figure.rarity}</span></div>
              <div class="item-name">${name}</div>
              <div class="item-text">${text}</div>
            </div>
            <div class="item-count">x${count}</div>
          </div>
        `;
      }).join('');
      tabContent.innerHTML = `<div class="list">${html}</div>`;
    }

    function renderRatesTab() {
      const html = FIGURES.map((figure, index) => {
        const figureNo = `No.${index + 1}`;
        return `
        <div class="item">
          <img class="thumb" src="${assetUrl(figure.image)}" alt="${figure.name}" onerror="this.src='https://placehold.co/120x120?text=${encodeURIComponent(figureNo)}'">
          <div class="item-main">
            <div class="item-row"><div><strong>${figureNo}</strong></div><span class="badge ${figure.rarity}" style="margin-top:0;">${figure.rarity}</span></div>
            <div class="item-name">${figure.name}</div>
            <div class="item-text">${figure.concept}</div>
          </div>
          <div class="item-count">${figure.dropRate}%</div>
        </div>
      `;
      }).join('');
      tabContent.innerHTML = `<div class="list">${html}</div>`;
    }

    function renderTab() {
      if (!isAdmin && activeTab === 'rates') activeTab = 'collection';
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === activeTab));
      if (isAdmin && activeTab === 'rates') renderRatesTab();
      else renderCollectionTab();
      updateProgress();
    }

    function renderResult(figure) {
      const figureNo = getFigureNo(figure);
      resultStage.innerHTML = `
        <div class="figure-card figure-card--single">
          <img src="${assetUrl(figure.image)}" alt="${figure.name}" onerror="this.src='https://placehold.co/400x400?text=${encodeURIComponent(figureNo)}'">
          <div class="badge ${figure.rarity}">${figure.rarity}</div>
          <div class="figure-name">${figureNo} ${figure.name}</div>
        </div>
      `;
      resultModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function renderMultiResult(results) {
      const html = results.map(figure => {
        const figureNo = getFigureNo(figure);
        return `
          <div class="result-tile" title="${figureNo} ${figure.name}">
            <img src="${assetUrl(figure.image)}" alt="${figureNo} ${figure.name}" onerror="this.src='https://placehold.co/120x120?text=${encodeURIComponent(figureNo)}'">
            <span class="result-tile-badge badge ${figure.rarity}">${figure.rarity}</span>
          </div>
        `;
      }).join('');
      resultStage.innerHTML = `<div class="result-grid">${html}</div>`;
      resultModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    async function spinGacha() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      if (multiSpinBtn) multiSpinBtn.disabled = true;
      spinBtn.textContent = 'pt確認中...';

      try {
        const pointResult = await consumePointBeforeGacha();
        if (!pointResult.ok) return;

        spinBtn.textContent = '抽選中...';
        machineTop.classList.add('spinning');
        handleWrap.classList.add('spinning');
        resultModal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        renderGachaLoadingAnimation('1回ガチャ抽選中', 'カプセルを取り出しています');

        await new Promise(resolve => setTimeout(resolve, 1400));
        const result = weightedDraw(FIGURES);

        inventory[result.id] = (inventory[result.id] || 0) + 1;
        totalSpins += 1;
        saveState();

        const savedResult = await saveGachaResultToServer(result);
        if (savedResult && savedResult.ok) {
          applyServerCollection(savedResult);
        } else {
          console.warn('saveGachaResult failed:', savedResult);
          const refundResult = await refundPointsAfterFailedSave(1);
          if (!refundResult || !refundResult.ok) {
            console.warn('refundGachaPoints failed:', refundResult);
          }
          alert('ガチャ結果のサーバー保存に失敗したため、消費ptを返却しました。');
        }

        renderResult(result);
        renderTab();

      } catch (err) {
        console.error('ガチャ処理中のエラー:', err);
        alert('ガチャ処理中にエラーが発生しました。');
      } finally {
        machineTop.classList.remove('spinning');
        handleWrap.classList.remove('spinning');
        spinBtn.disabled = false;
        spinBtn.textContent = '1回引く';
        spinning = false;
        updateMultiSpinButton(latestNewsPoints || 0);
      }
    }

    async function spinMultiGacha() {
      if (spinning) return;
      const availablePoints = Number(latestNewsPoints || 0);
      const drawCount = Math.min(10, Math.max(0, Math.floor(availablePoints)));
      if (drawCount <= 0) {
        alert('ptが不足しています。');
        return;
      }

      spinning = true;
      if (spinBtn) spinBtn.disabled = true;
      if (multiSpinBtn) {
        multiSpinBtn.disabled = true;
        multiSpinBtn.textContent = 'pt確認中...';
      }

      try {
        const pointResult = await consumePointsBeforeMultiGacha(drawCount);
        if (!pointResult.ok) return;
        const actualDrawCount = Number(pointResult.drawCount || drawCount);

        if (multiSpinBtn) multiSpinBtn.textContent = `${actualDrawCount}連抽選中...`;
        machineTop.classList.add('spinning');
        handleWrap.classList.add('spinning');
        resultModal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        renderGachaLoadingAnimation(`${actualDrawCount}連ガチャ抽選中`, 'まとめてカプセルを準備しています');

        await new Promise(resolve => setTimeout(resolve, 1400));
        const results = drawMultipleFigures(actualDrawCount);

        results.forEach(result => {
          inventory[result.id] = (inventory[result.id] || 0) + 1;
        });
        totalSpins += results.length;
        saveState();

        const savedResult = await saveGachaResultsToServer(results);
        if (savedResult && savedResult.ok) {
          applyServerCollection(savedResult);
        } else {
          console.warn('saveGachaResults failed:', savedResult);
          const refundResult = await refundPointsAfterFailedSave(results.length);
          if (!refundResult || !refundResult.ok) {
            console.warn('refundGachaPoints failed:', refundResult);
          }
          alert('ガチャ結果のサーバー保存に失敗したため、消費ptを返却しました。');
        }

        renderMultiResult(results);
        renderTab();

      } catch (err) {
        console.error('10連ガチャ処理中のエラー:', err);
        alert('10連ガチャ処理中にエラーが発生しました。');
      } finally {
        machineTop.classList.remove('spinning');
        handleWrap.classList.remove('spinning');
        spinning = false;
        if (spinBtn) spinBtn.disabled = false;
        updateMultiSpinButton(latestNewsPoints || 0);
      }
    }

    function showBackToNewsOverlay() {
      const overlay = document.getElementById('backToNewsOverlay');
      if (!overlay) return;
      overlay.classList.add('is-open');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function getSafeReturnUrl() {
      const raw = String(returnUrl || '').trim();
      if (!raw) return DEFAULT_NEWS_SITE_URL;
      try {
        const url = new URL(raw, window.location.href);
        const allowedOrigins = [
          'https://araragi0040-jpg.github.io/community-news-pwa/demo/',
          window.location.origin
        ];
        if (allowedOrigins.includes(url.origin)) return url.toString();
        return DEFAULT_NEWS_SITE_URL;
      } catch (_err) {
        return DEFAULT_NEWS_SITE_URL;
      }
    }

    function backToNewsSite() {
      showBackToNewsOverlay();
      const url = getSafeReturnUrl();
      setTimeout(() => {
        window.location.href = url;
      }, 450);
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!isAdmin && btn.dataset.tab === 'rates') return;
        activeTab = btn.dataset.tab;
        renderTab();
      });
    });

    document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const pageId = btn.dataset.page;

    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b === btn);
    });

    document.querySelectorAll('.page').forEach(page => {
      page.classList.toggle('active', page.id === pageId);
    });

    document.body.classList.toggle('is-gacha-page', pageId === 'gachaPage');
  });
});

    closeModalBtn.addEventListener('click', () => {
      resultModal.style.display = 'none';
      document.body.style.overflow = '';
    });

    resultModal.addEventListener('click', (e) => {
      if (e.target === resultModal) {
        resultModal.style.display = 'none';
        document.body.style.overflow = '';
      }
    });

    spinBtn.addEventListener('click', spinGacha);
    if (multiSpinBtn) multiSpinBtn.addEventListener('click', spinMultiGacha);
    if (backToNewsBtn) backToNewsBtn.addEventListener('click', backToNewsSite);

    renderTab();
    updateMultiSpinButton(0);

    loadNewsPointsForGacha().catch(err => {
      console.error('pt表示の取得に失敗しました:', err);
    });

    loadGachaCollectionFromServer().catch(err => {
      console.error('コレクション履歴の取得に失敗しました:', err);
    });
  </script>
</body>
</html>
